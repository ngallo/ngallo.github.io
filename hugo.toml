baseURL = 'https://www.ngallo.it/'
languageCode = 'en-uk'
enableRobotsTXT = true

[[module.imports]]
  path = 'github.com/lordmathis/hugo-theme-nightfall'

# ── Custom output formats for LLM crawlers ────────────────────────────────
[mediaTypes."text/plain"]
  suffixes = ["txt"]

[outputFormats.LLMsTxt]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "RSS", "LLMsTxt"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)'], ['$', '$']]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "dracula"

[module]
  [hugoVersion]
    extended = true
    min =  "0.150.0"

[menu]
  [[menu.header]]
    name = "blog"
    weight = 0
    url = "blog"
  [[menu.header]]
    name = "about"
    weight = 1
    url = "about"
  [[menu.header]]
    name = "disclaimer"
    weight = 1
    url = "disclaimer"

[related]
  includeNewer = true
  threshold = 50
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

[params]
color = "#58a6ff"
description = "Nicola Gallo — Cloud Native Security, Identity & Access Management, Zero Trust. Technical blog on ZTAuth*, PIC, Ambient Mesh, and decentralized systems."
openLinksInNewTab = true  # External links in blog posts open in new tab
user = "root"
hostname = "ngallo.it"
  [params.author]
    name = "Nicola Gallo"  # Website and RSS feed author
    email = "nicola.gallo@nitroagility.com"  # RSS feed email address

readingTime = true  # Show reading time on post page
published = true  # Show published data on post page

[[params.social]]
